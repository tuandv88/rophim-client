name: ReactJS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 
          cache: 'npm'

      - name: Cài đặt thư viện (Dependencies)
        run: npm ci

      - name: Kiểm tra Code Style (Linter)
        run: npm run lint --if-present
  
      - name: Thử nghiệm Build dự án
        run: CI=false npm run build
