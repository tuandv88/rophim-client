name: ReactJS CI/CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login Docker Hub
      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      # 3. Build & push image
      - name: Build & Push
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/rophim-client:latest .
          docker push ${{ secrets.DOCKER_USER }}/rophim-client:latest

      # 4. Deploy lên VPS
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USER }}/rophim-client:latest

            docker stop rophim || true
            docker rm rophim || true

            docker run -d -p 3000:80 \
              --name rophim \
              ${{ secrets.DOCKER_USER }}/rophim-client:latest

            echo "Done Tuanvp"